# Alembic Configuration for MindScan AI

# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(rev)s_%%(slug)s_%%(rev)d_%%(ts)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
#prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to the `timezone.tzinfo.tzname()` method of datetime.datetime
# Leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field when generating a migration file
# name.  The default value is 40, which means a
# name of "add column named created_at" would be
# truncated to 40 characters and file would be
# `xxxxx_add_column_named_created_at.py`
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# version location specification; This defaults
# to alembic/versions.  When using multiple version
# directories, initial revisions must be explicitly specified with --version-path-id
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# version path separator has changed in Alembic and now defaults
# to the value of `os.pathsep`, which varies across platform. Previous
# releases used the ':' separator uniformly. The default of `os.pathsep`
# should be preferred.
# version_path_separator = :

# the output encoding used when revision files
# are written from script.py.mako
# output_encoding = utf-8

sqlalchemy.url = sqlite+aiosqlite:///./mindscan_ai.db


# post_write_checks provides a convenient location to add checks after revision files
# are written to ensure consistency of the result before the files
# are committed to the repository. Made configurable to allow wider
# integration with different systems
# post_write_checks = 

# Logging configuration
[loggers]
keys = root,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy.engine]
level = INFO
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
